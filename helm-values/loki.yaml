# =============================================================================
# Grafana Loki — Helm values (single binary mode)
# Агрегация логов с индексацией по labels
# =============================================================================

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

# Single binary — один под для demo
singleBinary:
  replicas: 1
  persistence:
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Отключаем компоненты distributed mode
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Gateway не нужен в single binary
gateway:
  enabled: false

# Cache не нужен для demo
chunksCache:
  enabled: false
resultsCache:
  enabled: false
