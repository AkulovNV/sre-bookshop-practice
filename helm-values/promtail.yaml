# =============================================================================
# Promtail — Helm values
# Сбор логов с подов Kubernetes и отправка в Loki
# =============================================================================

config:
  clients:
    - url: http://loki.monitoring:3100/loki/api/v1/push

  # Pipeline stages для извлечения полей из JSON-логов
  snippets:
    pipelineStages:
      - docker: {}
      # Парсим JSON-логи приложения; non-JSON строки пропускаются
      - json:
          expressions:
            level: level
            service: service
            trace_id: traceID
      # Добавляем low-cardinality лейблы для фильтрации
      - labels:
          level:
          service:
      # traceID НЕ делаем лейблом (high cardinality),
      # сохраняем в structured metadata для корреляции logs↔traces
      - structured_metadata:
          trace_id:

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
