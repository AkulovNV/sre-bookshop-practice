apiVersion: v1
kind: Namespace
metadata:
  name: bookshop
  labels:
    app.kubernetes.io/part-of: bookshop
    team: sre-course
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: bookshop-quota
  namespace: bookshop
spec:
  hard:
    requests.cpu: "4"
    requests.memory: 4Gi
    limits.cpu: "8"
    limits.memory: 8Gi
    pods: "20"
    services: "10"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: bookshop-limits
  namespace: bookshop
spec:
  limits:
    - type: Container
      default:
        cpu: 200m
        memory: 256Mi
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      max:
        cpu: "2"
        memory: 2Gi
      min:
        cpu: 10m
        memory: 16Mi
