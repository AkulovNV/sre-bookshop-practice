apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: bookshop
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: bookshop
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_DB: bookshop
  POSTGRES_USER: bookshop
  POSTGRES_PASSWORD: "changeme-in-production"
  # Connection string для сервисов
  DATABASE_URL: "postgresql://bookshop:changeme-in-production@postgres:5432/bookshop?sslmode=disable"
