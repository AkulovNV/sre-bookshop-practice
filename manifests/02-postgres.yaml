# =============================================================================
# PostgreSQL — StatefulSet + Headless Service + PDB
# SLO: 99.99% availability, Query latency p99 < 50ms
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: bookshop
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: bookshop
    app.kubernetes.io/component: database
spec:
  type: ClusterIP
  # Headless service для StatefulSet — обеспечивает стабильные DNS-имена
  clusterIP: None
  ports:
    - name: postgresql
      port: 5432
      targetPort: 5432
      protocol: TCP
  selector:
    app.kubernetes.io/name: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: bookshop
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: bookshop
    app.kubernetes.io/component: database
    app.kubernetes.io/version: "16"
  annotations:
    # SLO metadata
    slo.bookshop/availability: "99.99"
    slo.bookshop/latency-p99-ms: "50"
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: bookshop
        app.kubernetes.io/component: database
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
    spec:
      terminationGracePeriodSeconds: 60
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgresql
          envFrom:
            - secretRef:
                name: postgres-credentials
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
            # Настройки для учебного стенда
            - name: POSTGRES_INITDB_ARGS
              value: "--encoding=UTF-8 --locale=en_US.UTF-8"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          # -----------------------------------------------------------------
          # Probes — критически важно для SRE
          # -----------------------------------------------------------------
          # startupProbe — PostgreSQL может долго стартовать (initdb, recovery)
          startupProbe:
            exec:
              command:
                - pg_isready
                - -U
                - bookshop
                - -d
                - bookshop
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 30  # 5 * 30 = 150 секунд на старт
          # livenessProbe — проверяем, что процесс жив
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - bookshop
                - -d
                - bookshop
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          # readinessProbe — проверяем, что можно принимать запросы
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - bookshop
                - -d
                - bookshop
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
# PDB — гарантируем доступность при maintenance
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: postgres-pdb
  namespace: bookshop
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: bookshop
spec:
  # Для single-replica StatefulSet minAvailable: 0 при плановом обслуживании
  # В production используйте replica set и minAvailable: 1
  minAvailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
---
# Init SQL — создание таблиц
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: bookshop
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: bookshop
data:
  01-schema.sql: |
    -- Таблица книг
    CREATE TABLE IF NOT EXISTS books (
        id          SERIAL PRIMARY KEY,
        title       VARCHAR(255) NOT NULL,
        author      VARCHAR(255) NOT NULL,
        isbn        VARCHAR(20) UNIQUE,
        price       NUMERIC(10,2) NOT NULL DEFAULT 0,
        stock       INTEGER NOT NULL DEFAULT 0,
        created_at  TIMESTAMPTZ DEFAULT NOW()
    );

    -- Таблица заказов
    CREATE TABLE IF NOT EXISTS orders (
        id          SERIAL PRIMARY KEY,
        customer    VARCHAR(255) NOT NULL,
        status      VARCHAR(50) DEFAULT 'pending',
        total       NUMERIC(10,2) NOT NULL DEFAULT 0,
        created_at  TIMESTAMPTZ DEFAULT NOW(),
        updated_at  TIMESTAMPTZ DEFAULT NOW()
    );

    -- Позиции заказа
    CREATE TABLE IF NOT EXISTS order_items (
        id          SERIAL PRIMARY KEY,
        order_id    INTEGER REFERENCES orders(id),
        book_id     INTEGER REFERENCES books(id),
        quantity    INTEGER NOT NULL DEFAULT 1,
        price       NUMERIC(10,2) NOT NULL
    );

    -- Индексы для типичных запросов
    CREATE INDEX IF NOT EXISTS idx_books_author ON books(author);
    CREATE INDEX IF NOT EXISTS idx_orders_status ON orders(status);
    CREATE INDEX IF NOT EXISTS idx_order_items_order ON order_items(order_id);

  02-seed.sql: |
    -- Тестовые данные
    INSERT INTO books (title, author, isbn, price, stock) VALUES
        ('Site Reliability Engineering', 'Betsy Beyer et al.', '978-1491929124', 45.99, 100),
        ('The Site Reliability Workbook', 'Betsy Beyer et al.', '978-1492029502', 49.99, 75),
        ('Designing Distributed Systems', 'Brendan Burns', '978-1491983645', 39.99, 50),
        ('Kubernetes in Action', 'Marko Luksa', '978-1617293726', 54.99, 60),
        ('Observability Engineering', 'Charity Majors et al.', '978-1492076445', 47.99, 40),
        ('Database Reliability Engineering', 'Laine Campbell', '978-1491925942', 42.99, 35),
        ('Chaos Engineering', 'Casey Rosenthal et al.', '978-1492043867', 44.99, 45),
        ('Building Secure & Reliable Systems', 'Heather Adkins et al.', '978-1492083122', 55.99, 30)
    ON CONFLICT (isbn) DO NOTHING;
