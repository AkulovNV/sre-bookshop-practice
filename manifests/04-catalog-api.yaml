# =============================================================================
# catalog-api — Deployment + Service + HPA + PDB
# SLO: 99.5% latency p95 < 300ms
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: bookshop
  labels:
    app.kubernetes.io/name: catalog-api
    app.kubernetes.io/part-of: bookshop
    app.kubernetes.io/component: backend
    app.kubernetes.io/version: "1.0.0"
  annotations:
    slo.bookshop/type: "latency"
    slo.bookshop/target: "99.5"
    slo.bookshop/latency-p95-ms: "300"
    slo.bookshop/owner: "backend-team"
spec:
  replicas: 2
  # ---------------------------------------------------------------------------
  # Стратегия деплоя — RollingUpdate
  # maxSurge: 1 — допускаем +1 под сверх replicas
  # maxUnavailable: 0 — ни один под не убивается до готовности нового
  # Это обеспечивает zero-downtime deployment
  # ---------------------------------------------------------------------------
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog-api
        app.kubernetes.io/part-of: bookshop
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 30
      # Spread по зонам для HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: catalog-api
      containers:
        - name: catalog-api
          image: akulovnv/bookshop-catalog-api:v1.3.0
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DATABASE_URL
            - name: SERVICE_NAME
              value: "catalog-api"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://tempo.monitoring:4317"
            # Inject pod metadata для логов и трейсов
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          # -------------------------------------------------------------------
          # Probes
          # -------------------------------------------------------------------
          # startupProbe — pip install может занять время
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30  # до 160 секунд на старт
          # livenessProbe — жив ли процесс?
          # Проверяет /healthz — лёгкий endpoint без зависимостей
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          # readinessProbe — готов ли принимать трафик?
          # Проверяет /ready — включает проверку подключения к БД
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
      volumes: []
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-api
  namespace: bookshop
  labels:
    app.kubernetes.io/name: catalog-api
    app.kubernetes.io/part-of: bookshop
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  selector:
    app.kubernetes.io/name: catalog-api
---
# HPA — автомасштабирование по CPU и custom метрикам
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: catalog-api
  namespace: bookshop
  labels:
    app.kubernetes.io/name: catalog-api
    app.kubernetes.io/part-of: bookshop
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: catalog-api
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300  # 5 мин стабилизации перед scale down
      policies:
        - type: Percent
          value: 25               # Снижать не более чем на 25%
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Pods
          value: 2                # Добавлять до 2 подов за раз
          periodSeconds: 60
---
# PDB — гарантируем, что хотя бы 1 под всегда доступен
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: catalog-api-pdb
  namespace: bookshop
  labels:
    app.kubernetes.io/name: catalog-api
    app.kubernetes.io/part-of: bookshop
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog-api
