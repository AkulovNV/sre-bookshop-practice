# =============================================================================
# Ingress — компоненты мониторинга (Grafana, Prometheus, Alertmanager)
# =============================================================================

# --- Grafana UI ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-ingress
    app.kubernetes.io/part-of: bookshop
spec:
  ingressClassName: nginx
  rules:
    - host: grafana.bookshop.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-grafana
                port:
                  number: 80

---
# --- Prometheus UI ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus-ingress
  namespace: monitoring
  labels:
    app.kubernetes.io/name: prometheus-ingress
    app.kubernetes.io/part-of: bookshop
spec:
  ingressClassName: nginx
  rules:
    - host: prometheus.bookshop.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-prometheus
                port:
                  number: 9090

---
# --- Alertmanager UI ---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alertmanager-ingress
  namespace: monitoring
  labels:
    app.kubernetes.io/name: alertmanager-ingress
    app.kubernetes.io/part-of: bookshop
spec:
  ingressClassName: nginx
  rules:
    - host: alertmanager.bookshop.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-alertmanager
                port:
                  number: 9093
