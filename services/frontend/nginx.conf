worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Формат логов с метриками для SLI
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # Upstream backends
    upstream catalog_api {
        server catalog-api:8080;
        keepalive 16;
    }

    upstream order_api {
        server order-api:8080;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # Корневая страница
        root /usr/share/nginx/html;
        index index.html;

        # Health checks для Kubernetes probes
        location /healthz {
            access_log off;
            return 200 '{"status":"alive","service":"frontend"}';
            add_header Content-Type application/json;
        }

        location /ready {
            access_log off;
            return 200 '{"status":"ready","service":"frontend"}';
            add_header Content-Type application/json;
        }

        # Stub status для метрик nginx
        location /nginx_status {
            stub_status on;
            access_log off;
            allow 127.0.0.1;
            allow 10.0.0.0/8;
            allow 172.16.0.0/12;
            deny all;
        }

        # Проксирование к catalog-api
        location /api/books {
            proxy_pass http://catalog_api/books;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # Проксирование к order-api
        location /api/orders {
            proxy_pass http://order_api/orders;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;
            proxy_connect_timeout 5s;
            proxy_read_timeout 30s;
        }

        # SPA fallback
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
